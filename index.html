El lugar donde nació la pregunta
En el pueblo donde vivía el joven, todos parecían saber qué era el amor.
Lo sabían los ancianos que caminaban juntos tomados del brazo después de tantos años.
Lo sabían los niños que corrían hacia sus padres cuando caían.
Lo sabían los amigos que guardaban secretos que nunca contarían.
Incluso lo sabían las flores del jardín, que cada primavera volvían a abrirse aunque el

Todos parecían tener una respuesta.

Lo había visto en una madre que esperaba despierta hasta escuchar que su hijo había

Lo había visto en alguien que guardaba una carta vieja como si fuera un tesoro.
Lo había visto en dos personas que, después de una discusión, elegían sentarse una al

Alguien recordando.
Alguien perdonando.
Alguien amando en silencio.

Abrió la puerta.

La anciana sonrió.
-A todas las respuestas que todavía no sabés que estás buscando.

Por primera vez, la pregunta que tanto lo había acompañado no parecía una carga.

Esa misma tarde preparó una pequeña mochila.
Guardó su cuaderno.
Una pluma.
Algo de comida.
Y salió del pueblo siguiendo un camino que nadie podía señalar en un mapa.
Porque algunas búsquedas no comienzan cuando encontramos una dirección.
Comienzan cuando aceptamos que todavía no sabemos hacia dónde vamos.
El primer paso
El camino fuera del pueblo no era como el joven lo había imaginado.
Durante mucho tiempo había pensado que, cuando una persona encuentra algo que
busca con todo el corazón, el mundo de alguna manera lo reconoce.
Creía que aparecerían señales.
Que el cielo tendría un color diferente.
Que una voz desconocida le susurraría la dirección correcta.
Que en algún lugar encontraría un cartel enorme que dijera:
"Aquí comienza la respuesta que viniste a buscar."
Pero nada de eso ocurrió.
El mundo continuó igual.
El sol salió como todos los días.
Los pájaros siguieron cantando sin saber que alguien había dejado su hogar para
encontrar una respuesta.
Los árboles permanecieron inmóviles, guardando secretos que parecían demasiado
antiguos para ser contados.
Y el joven siguió caminando.
Al principio le molestó aquella indiferencia.
-¿Cómo puede ser que una pregunta tan importante no cambie nada? -pensó.
Pero después de varias horas entendió algo:
Quizás las cosas más importantes no hacen ruido cuando comienzan.
Una semilla no anuncia el momento exacto en el que empieza a convertirse en árbol.
Una estrella no avisa la noche en la que decide iluminar.
Y una persona tampoco sabe el instante exacto en el que alguien empieza a cambiar su
vida.
A veces lo más grande comienza de la forma más pequeña.
Con una conversación.
Con una mirada.
Con una pregunta.
Con un camino que nadie más entiende.
Al caer la tarde, el joven se sentó junto a un río que atravesaba el bosque.
El agua avanzaba lentamente, sin detenerse nunca, pero tampoco parecía tener prisa.
Durante un largo rato se quedó observándola.
Entonces pensó que quizás el amor se parecía un poco a aquel río.
Las personas siempre querían saber hacia dónde las llevaría.
Querían conocer el final antes de empezar.
Querían tener la seguridad de que el camino no tendría piedras, curvas ni momentos en

Pero el río no sabía qué encontraría después de la próxima montaña.
Simplemente seguía avanzando.
Tal vez amar también era eso.
Caminar incluso sin tener todas las respuestas.
Confiar aunque existieran dudas.
Elegir algo sin poder prometer que nunca cambiaría.

respuesta.
A veces llegan como una sensación.
Como esa tranquilidad extraña que aparece cuando, aunque todavía estés perdido, sentís
que estás caminando hacia el lugar corre
Antes de guardar el cuaderno, miró su primera página.
La pregunta seguía ahí.
¿Qué es amar?
Pero algo había cambiado.
Antes esperaba que alguien le diera una definición.
Ahora quería conocer todas las historias que se escondían detrás de esa palabra.
Porque quizás el amor no era una respuesta escrita en algún lugar esperando ser
encontrada.
Quizás era un idioma.
Y cada persona que había amado alguna vez había pronunciado una pequeña parte de él.
Esa noche, mientras las estrellas aparecían lentamente sobre el cielo oscuro, el joven
entendió que su viaje recién comenzaba.
Todavía no conocía los lugares a los que llegaria.
Todavía no sabía a quiénes encontraría.
Todavía no sabía que algunas historias le enseñarían sobre la felicidad y otras sobre el
dolor.
Pero había algo que ya sabía:
Nadie sale en busca del amor y vuelve siendo la misma persona.
Capítulo II
El jardinero de las mil flores
Al tercer día de viaje, el joven llegó a un valle donde el aire olía a tierra húmeda y a
primavera, aunque el calendario insistiera en que todavía era invierno.
Desde lo alto de una colina vio un jardín inmenso.
Había flores de todos los tamaños.
Unas crecían juntas, abrazándose unas a otras.
Otras florecian solas, como si hubieran aprendido a no necesitar compañía.
Nunca había visto tantos colores reunidos en un mismo lugar.
En el centro del jardín trabajaba un anciano.
Llevaba un sombrero de paja demasiado grande y unas manos marcadas por el tiempo.
Regaba cada flor con la misma delicadeza, como si ninguna fuera más importante que
otra.
El joven esperó unos minutos antes de acercarse.
No quería interrumpir.
Había algo casi sagrado en la forma en que aquel hombre cuidaba el jardín.
Cuando el anciano terminó de llenar su regadera, levantó la vista y sonrió.
-Llegaste.
El muchacho se sorprendió.
-¿Me estaba esperando?
El jardinero negó con la cabeza.
-No.
Hizo una pausa.
-Pero sabía que tarde o temprano alguien vendría a hacerme una pregunta.
El joven sonrió.
-¿Cómo lo supo?

Quien cuida un jardín aprende que algunas visitas llegan por curiosidad.
Otras llegan porque están perdidas.
Y unas pocas llegan porque el corazón ya no puede seguir haciéndose la misma

Caminaron entre los senderos durante un largo rato.
Había flores que apenas comenzaban a abrirse y otras que ya habían perdido sus pétalos.

-¿Cuál es tu favorita? -preguntó el joven.
El anciano no respondió.
Siguió caminando.
El muchacho creyó que no lo había escuchado.
Repitió la pregunta.
Entonces el jardinero se detuvo frente a una flor pequeña, de pétalos blancos, casi

No era la más llamativa.
Ni la más alta.
Ni la más perfumada.
A simple vista parecía una flor cualquiera.
-Estadijo finalmente.
El joven miró alrededor, confundido.
-Pero hay flores mucho más hermosas.
El anciano asintió.
Claro que las hay.
-Entonces... ¿por qué eligió esa?
El jardinero sonrió con una paciencia que solo tienen quienes aprendieron a no

Seguía sin entender.

-No.

Mañana.
Y al día siguiente.

Lo extraordinario es quedarse cuando el invierno llega y confiar en que la primavera

-¿Qué cosa?
El anciano cerró el cuaderno con cuidado.
Que las flores más hermosas no son las que nunca se marchitan.
Son aquellas que nos enseñan por qué valió la pena cuidarlas.
Y el joven continuó su camino con una nueva certeza.
Quizás el amor no era encontrar a la persona perfecta.
Quizás era aprender a convertir el cuidado en una forma de permanecer.
El joven no se marchó enseguida.
Había algo en aquel jardín que lo obligaba a quedarse un poco más. No era la belleza de
las flores. Tampoco el perfume que el viento llevaba de un lado a otro. Era la calma con
la que el jardinero hacía cada cosa.
Nunca parecía tener prisa.
Regaba una flor.
Después otra.
Luego se detenía a quitar una hoja seca.
Más tarde volvía sobre sus pasos porque había recordado una pequeña planta que
todavía no había recibido agua.
Todo lo hacía con la misma paciencia.
Como si el tiempo, allí, caminara más despacio.
-¿Nunca te cansás? -preguntó el joven.
El anciano dejó la regadera sobre el suelo.
-Si.
La respuesta lo sorprendió.
Esperaba escuchar un "nunca".
-¿Y entonces por qué seguís haciéndolo?
El jardinero tardó unos segundos en responder.
Miró sus manos. Estaban ásperas, cubiertas por pequeñas cicatrices que el joven no

-Porque hay una gran diferencia entre estar cansado y querer abandonar.
El muchacho guardó silencio.
-Las personas suelen confundirlas.
Creen que, cuando algo pesa, significa que dejó de valer la pena.
Pero los árboles también deben sostener el peso de sus ramas para poder dar sombra.
Las montañas soportan el viento durante siglos.
Y el mar nunca deja de empujar las olas hacia la orilla.
Las cosas más hermosas del mundo también conocen el cansancio.

Pensó en todas las veces que había visto a alguien rendirse solo porque el camino se

¿El amor también cansa?
El anciano sonrió con una tristeza serena.
-A veces.
El joven abrió mucho los ojos.

Si el amor era algo tan hermoso, ¿por qué tendría que cansar?

El error más común es creer que todos necesitan ser amados de la misma manera.
Pero amar también es aprender el idioma del otro.
Porque hay quienes se sienten queridos con un abrazo.
Hay quienes necesitan palabras.
Hay quienes solo quieren que alguien permanezca.

El joven sintió un nudo en el pecho.
Por primera vez comprendió que amar no era solo sentir.
Era observar.
Escuchar.
Aprender.
Y elegir todos los días la manera en que el otro necesitaba ser cuidado.
Antes de despedirse, volvió a mirar el jardín.
Ya no vio cientos de flores.
Vio cientos de formas distintas de florecer.
Y entendió que quizás las personas también eran así.
Ninguna amaba igual.
Ninguna necesitaba exactamente lo mismo.

    document.addEventListener("DOMContentLoaded", () => {
        const measureBox = document.getElementById('measure-box');
        const measureInner = document.getElementById('measure-inner');
        const book = document.getElementById('book');
        const paragraphs = rawText.split('\n').filter(p => p.trim() !== '');
        
        let pagesContent = [];
        let currentContent = document.createElement('div');
        currentContent.className = 'page-content';
        measureInner.appendChild(currentContent);
        
        // Empaquetador de páginas
        function pushPage() {
            pagesContent.push(currentContent.innerHTML);
            measureInner.innerHTML = '';
            currentContent = document.createElement('div');
            currentContent.className = 'page-content';
            measureInner.appendChild(currentContent);
        }

        paragraphs.forEach(p => {
            let el;
            
            if (p.startsWith('Capítulo') || p.startsWith('Para Angel')) {
                // Forzar página nueva en cada capítulo o dedicatoria
                if(currentContent.childNodes.length > 0) {
                    pushPage();
                }
                el = document.createElement('h2');
                el.innerText = p.startsWith('Para Angel') ? 'Dedicatoria' : p;
            } 
            else if (p.startsWith('-')) {
                el = document.createElement('p');
                el.className = 'dialogue';
                el.innerText = p;
            } 
            else {
                // Subtítulo si es el primer párrafo después del título
                if (currentContent.childNodes.length === 1 && currentContent.firstChild.tagName === 'H2') {
                    el = document.createElement('h3');
                    el.innerText = p;
                } else {
                    el = document.createElement('p');
                    el.innerText = p;
                }
            }
            
            currentContent.appendChild(el);
            
            // Corte perfecto de página (si se desborda, lo pasamos a la siguiente)
            if (currentContent.childNodes.length > 1 && currentContent.scrollHeight > currentContent.clientHeight) {
                currentContent.removeChild(el); 
                pushPage(); 
                currentContent.appendChild(el); 
            }
        });
        
        // Guardar última página
        if (currentContent.childNodes.length > 0) {
            pushPage();
        }
        
        // -----------------------------------------------------
        // CONSTRUCCIÓN DEL LIBRO EN 3D
        // -----------------------------------------------------
        let html = '';
        
        // HOJA 0 (Portada y contra-portada interior)
        html += `
        <div class="leaf" style="z-index: 100;">
            <div class="page page-front cover-front">
                <div class="cover-hint">Toca para abrir</div>
            </div>
            <div class="page page-back">
                <div class="page-content">${pagesContent[0] || ''}</div>
                <div class="page-number">1</div>
            </div>
        </div>`;
        
        // HOJAS DE CONTENIDO
        let z = 99;
        for (let i = 1; i < pagesContent.length; i += 2) {
            let frontContent = pagesContent[i] || '';
            let backContent = pagesContent[i+1] || '';
            
            html += `
            <div class="leaf" style="z-index: ${z--};">
                <div class="page page-front">
                    <div class="page-content">${frontContent}</div>
                    ${frontContent ? `<div class="page-number">${i+1}</div>` : ''}
                </div>
                <div class="page page-back">
                    <div class="page-content">${backContent}</div>
                    ${backContent ? `<div class="page-number">${i+2}</div>` : ''}
                </div>
            </div>`;
        }

        // HOJA FINAL (Contratapa rígida)
        html += `
        <div class="leaf" style="z-index: ${z--};">
            <div class="page page-front"></div>
            <div class="page page-back cover-back" style="background-color: #0f0a08; border-right: 15px solid #050302;"></div>
        </div>`;
        
        book.innerHTML = html;
        
        // -----------------------------------------------------
        // LÓGICA DE INTERACCIÓN Y CAPAS (Z-INDEX)
        // -----------------------------------------------------
        const leaves = document.querySelectorAll('.leaf');
        let currentLeaf = 0;
        let audioPlayed = false;
        
        const btnLeft = document.getElementById('guide-left');
        const btnRight = document.getElementById('guide-right');

        function updateGuides() {
            btnLeft.style.display = currentLeaf > 0 ? 'block' : 'none';
            btnRight.style.display = currentLeaf < leaves.length - 1 ? 'block' : 'none';
        }
        updateGuides();

        document.querySelector('.book-container').addEventListener('click', (e) => {
            const rect = book.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            
            // Clic en la mitad Derecha (Avanzar)
            if (clickX > rect.width / 2) {
                // Impide pasar la contratapa
                if (currentLeaf < leaves.length - 1) {
                    if (currentLeaf === 0) {
                        book.classList.add('open'); 
                        if (!audioPlayed) {
                            const audio = document.getElementById('musica');
                            audio.play().catch(err => console.log("Bloqueo de navegador."));
                            audioPlayed = true;
                        }
                    }
                    leaves[currentLeaf].classList.add('flipped');
                    // Corrección del z-index para que se apilen bien al lado izquierdo
                    leaves[currentLeaf].style.zIndex = currentLeaf + 1; 
                    currentLeaf++;
                }
            } 
            // Clic en la mitad Izquierda (Retroceder)
            else {
                if (currentLeaf > 0) {
                    currentLeaf--;
                    leaves[currentLeaf].classList.remove('flipped');
                    // Corrección del z-index para que se apilen bien al lado derecho
                    leaves[currentLeaf].style.zIndex = 100 - currentLeaf; 
                    
                    if (currentLeaf === 0) {
                        book.classList.remove('open'); 
                    }
                }
            }
            updateGuides();
        });
    });
</script>
